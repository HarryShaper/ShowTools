show_profile:
  name: "Gunslinger_MU"
  auto_load_defaults: true   # Set to false if you want a blank UI each time
  apply_project_name_on_startup: true
  apply_wranglers_on_startup: true
  apply_email_defaults_on_startup: true

project_defaults:
  project_name: "Gunslinger"
  unit: "Main Unit"

wrangler_defaults:
  options:
    - ""
    - "Louis"
    - "Grace"
    - "Oscar"

  default_selection: "Oscar"

email_defaults:
  enabled_by_default: false
  subject: "{project_name} {clean_package_name} ready for ingestion"
  body: |
    Hi,

    {clean_package_name} is packaged and ready for ingestion.

    Thanks,
    -Oscar
    
  to:
    - "data.team@studio.com"
    - "production@studio.com"
  cc:
    - "vfxsupervisor@studio.com"

browser_defaults:
  preferred_browser: "edge"   # Options: "default", "chrome", "edge"