project_details:
  project_name: Outcast
package_settings:
  rename_package: true
  remove: _dump
  prefix: ''
  suffix: _SORTED
  generate_yaml: true
  notify_by_email: false
  flag_empty_folders: false
rename_rules:
- name: HDRI
  data_type: HDRI
  sort_by: SLATE
  split_image_type: true
  delete_empty_folders: false
  naming_rule: '{DATA_TYPE}_{ALL}_{WRANGLER}'
- name: OVERVIEW
  data_type: OVERVIEW
  sort_by: SLATE
  split_image_type: false
  delete_empty_folders: false
  naming_rule: '{DATE}_{DATA_TYPE}_{ALL}'
